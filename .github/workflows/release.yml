name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: tar.gz
            exe: magicvision

          - os: macos-latest
            archive: tar.gz
            exe: magicvision

          - os: windows-latest
            archive: zip
            exe: magicvision.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    env:
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      #####################################
      # Install Dependencies
      #####################################

      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopencv-dev \
            clang \
            libclang-dev \
            pkg-config
          # echo "OPENCV_DIR=/usr" >> $GITHUB_ENV

      - if: runner.os == 'macOS'
        run: |
          brew install llvm opencv
          echo "OPENCV_DIR=$(brew --prefix opencv)" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

      - if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install llvm opencv -y
          # Verify installation path
          $opencvPath = Get-ChildItem "C:\ProgramData\chocolatey\lib\opencv*" -Directory |
            Select-Object -First 1

          "OPENCV_DIR=$($opencvPath.FullName)\build" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      #####################################

      - run: cargo build --release --locked

      - if: runner.os != 'Windows'
        run: |
          test -f target/release/${{ matrix.exe }} || exit 1

      - if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (!(Test-Path target\release\${{ matrix.exe }})) {
            throw "Build failed"
          }

      #####################################
      # Package and validate
      #####################################

      - if: runner.os == 'Linux'
        run: |
          mkdir release
          cp target/release/magicvision release/
          cp target/release/refresh-database release/
          cp README.md LICENSE release/

          # Verify files before archiving
          ls -la release/
          tar czf magicvision-${{ github.ref_name }}-${{ runner.os }}.tar.gz -C release .
          test -f magicvision-${{ github.ref_name }}-${{ runner.os }}.tar.gz

      - if: runner.os == 'macOS'
        run: |
          mkdir release
          cp target/release/magicvision release/
          cp target/release/refresh-database release/
          cp README.md LICENSE release/

          # Verify files before archiving
          ls -la release/
          tar czf magicvision-${{ github.ref_name }}-${{ runner.os }}.tar.gz -C release .
          test -f magicvision-${{ github.ref_name }}-${{ runner.os }}.tar.gz

      - if: runner.os == 'Windows'
        shell: powershell
        run: |
          mkdir release

          Copy-Item target\release\magicvision.exe release\

          Copy-Item target\release\refresh-database.exe release\

          Copy-Item README.md LICENSE release\

          # copy OpenCV runtime libs
          $opencvBins = "C:\ProgramData\chocolatey\lib\opencv\*\build\x64\vc*\bin" -replace '\*', '*'

          $dlls = Get-ChildItem "$opencvBins\opencv*.dll"

          if ($dlls.Count -eq 0) {
            throw "No OpenCV DLLs found."
          }

          ls release\
          Compress-Archive -Path release\* -DestinationPath magicvision-${{ github.ref_name }}-windows.zip
          test-Path magicvision-${{ github.ref_name }}-windows.zip

      #####################################

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
