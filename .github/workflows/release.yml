name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe: magicvision
            archive: tar.gz
            platform: linux

          - os: macos-latest
            target: aarch64-apple-darwin
            exe: magicvision
            archive: tar.gz
            platform: macos

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe: magicvision.exe
            archive: zip
            platform: windows

    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    env:
      RUST_BACKTRACE: 1
      OPENCV_VERSION: 5.0.0
      PKG_CONFIG_ALLOW_CROSS: "1"

    steps:
      #########################################
      # Checkout
      #########################################
      - uses: actions/checkout@v4
        if: matrix.platform != 'windows'
        with:
          ref: master

      - uses: actions/checkout@v4
        if: matrix.platform == 'windows'
        with:
          ref: master-windows

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      #########################################
      # OpenCV
      #########################################

      - name: Setup OpenCV
        uses: ./.github/actions/opencv
        if: matrix.platform != 'windows'
        with:
          version: 5.0.0
          platform: ${{ matrix.platform }}

      - name: Setup OpenCV
        uses: ./.github/actions/opencv
        if: matrix.platform == 'windows'
        with:
          version: 4.13.0
          platform: ${{ matrix.platform }}

      #########################################
      # Build
      #########################################

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}

      #########################################
      # Package
      #########################################

      - name: Package (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          mkdir release

          cp target/${{ matrix.target }}/release/magicvision release/
          cp target/${{ matrix.target }}/release/refresh-database release/
          cp README.md LICENSE release/

          tar czf magicvision-${{ github.ref_name }}-${{ matrix.platform }}.${{ matrix.archive }} -C release .

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          mkdir release

          Copy-Item target\${{ matrix.target }}\release\magicvision.exe release\

          Copy-Item target\${{ matrix.target }}\release\refresh-database.exe release\

          Copy-Item README.md release/

          Copy-Item LICENSE release/

          $dlls = Get-ChildItem C:\tools\opencv\build\x64 -Recurse -Filter "opencv_world*.dll"

          if (-not $dlls) {
            throw "No OpenCV DLLs found"
          }

          Write-Host "Copying OpenCV DLLs:"
          $dlls | ForEach-Object {
            Write-Host "  $($_.FullName)"
            Copy-Item $_.FullName release\
          }

          Compress-Archive `
            -Path release\* `
            -DestinationPath magicvision-${{ github.ref_name }}-${{ matrix.platform }}.${{ matrix.archive }}

      #########################################
      # Release
      #########################################

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
