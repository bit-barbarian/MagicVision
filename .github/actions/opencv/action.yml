name: Setup OpenCV
description: Builds or restores OpenCV for the current runner

inputs:
  version:
    description: Builds or restores OpenCV for the current runner
    required: true
    default: "5.0.0"
  platform:
    description: Pass matrix platform into composite action
    required: true

runs:
  using: composite
  steps:
    #########################################
    # Linux (build from source)
    #########################################

    - name: Build OpenCV (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential ninja-build cmake git pkg-config \
          clang libclang-dev \
          libgtk-3-dev libjpeg-dev libpng-dev libtiff-dev \
          libavcodec-dev libavformat-dev libswscale-dev

        git clone --depth 1 --branch ${{ inputs.version }} https://github.com/opencv/opencv.git

        cmake -S opencv -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=$HOME/opencv-install \
          -DBUILD_LIST=core,geometry,imgproc,videoio \
          -DBUILD_TESTS=OFF \
          -DBUILD_PERF_TESTS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_DOCS=OFF \
          -DBUILD_JAVA=OFF \
          -DBUILD_opencv_apps=OFF

        cmake --build build
        cmake --install build

    - name: Verify OpenCV install
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        echo "==== install tree ===="
        find $HOME/opencv-install -maxdepth 4 | sort

        echo
        echo "==== pkgconfig ===="
        find $HOME/opencv-install -name "*.pc"

        echo
        echo "==== cmake ===="
        find $HOME/opencv-install -name "*OpenCV*.cmake"

        echo
        echo "==== opencv config ===="
        find $HOME/opencv-install -name "*opencv*config*.cmake"

    - name: Configure OpenCV (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        echo "OpenCV_DIR=$HOME/opencv-install/lib/cmake/opencv5" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=$HOME/opencv-install/lib/pkgconfig" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=$HOME/opencv-install" >> $GITHUB_ENV

    #########################################
    # macOS (Homebrew)
    #########################################

    - name: Install OpenCV (macOS)
      if: inputs.platform == 'macos'
      shell: bash
      run: |
        brew update
        brew install opencv ninja llvm

        echo "OpenCV_DIR=$(brew --prefix opencv)/lib/cmake/opencv5" >> $GITHUB_ENV
        echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

    #########################################
    # Windows (choco)
    #########################################

    - name: Set up MSVC environment
      if: inputs.platform == 'windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install OpenCV
      if: inputs.platform == 'windows'
      shell: powershell
      run: |
        choco install -y llvm
        choco install -y opencv --version ${{ inputs.version }}

        $lib = Get-ChildItem C:\tools -Recurse -Filter opencv_world*.lib |
          Select-Object -First 1

        $dll = Get-ChildItem C:\tools -Recurse -Filter opencv_world*.dll |
          Select-Object -First 1

        $include = Get-ChildItem C:\tools -Recurse -Directory |
          Where-Object {
            Test-Path "$($_.FullName)\opencv2\core.hpp"
          } | Select-Object -First 1

        if (!$lib)     { throw "Couldn't find OpenCV .lib" }
        if (!$dll)     { throw "Couldn't find OpenCV .dll" }
        if (!$include) { throw "Couldn't find OpenCV headers" }

        $libName = [System.IO.Path]::GetFileNameWithoutExtension($lib.Name)

        Write-Host "Configuring OpenCV..."
        Write-Host "Library: $($lib.FullName)"
        Write-Host "DLL: $($dll.FullName)"
        Write-Host "Include: $($include.FullName)"

        "OPENCV_DISABLE_PROBES=cmake,pkg_config,vcpkg,vcpkg_cmake" >> $env:GITHUB_ENV
        "OPENCV_LINK_LIBS=$libName" >> $env:GITHUB_ENV
        "OPENCV_LINK_PATHS=$($lib.DirectoryName)" >> $env:GITHUB_ENV
        "OPENCV_INCLUDE_PATHS=$($include.FullName)" >> $env:GITHUB_ENV
        "PATH=$($dll.DirectoryName);$env:PATH" >> $env:GITHUB_ENV
